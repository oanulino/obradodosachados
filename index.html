<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O Brabos dos Achados</title>
  <meta name="description" content="Aqui é brabo mesmo — as melhores ofertas, cupons e achados do Brasil." />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #25d366;
    }

    .identity {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .name-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
    }

    .verified {
      background: #25d366;
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .handle {
      color: #888;
      font-size: 0.9rem;
    }

    .bio {
      text-align: center;
      color: #ccc;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .stats {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .stat {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #25d366;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:hover {
      transform: scale(1.02);
      opacity: 0.92;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-whatsapp {
      background: #25d366;
      color: #fff;
    }

    .btn-instagram {
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: #fff;
    }

    .btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .footer {
      text-align: center;
      color: #555;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .footer a {
      color: #555;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="identity">
      <div class="name-row">
        <span class="name">O Brabos dos Achados</span>

      <span class="handle">@obrabodosachadosbr</span>

    <p class="bio">Aqui é brabo mesmo — as melhores ofertas, cupons e achados do Brasil.<br>Para de pagar caro! 💸</p>

    <div class="stats">

        <span class="stat-label">Membros</span>
      </div>
      <div class="stat">
        <span class="stat-value">100+</span>
        <span class="stat-label">Ofertas/dia</span>
      </div>
      <div class="stat">
        <span class="stat-value">R$0</span>
        <span class="stat-label">Gratuito</span>
      </div>
    </div>

    <p class="footer">

  </div>
</body>
</html>
